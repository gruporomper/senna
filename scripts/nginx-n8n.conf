# Add this inside the server block of /etc/nginx/sites-available/senna.marlon.pro
# After the existing location / block

# n8n reverse proxy
location /n8n/ {
    proxy_pass http://127.0.0.1:5678/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
}

# n8n webhook endpoints (used by external services like Gmail, Calendar)
location /n8n/webhook/ {
    proxy_pass http://127.0.0.1:5678/webhook/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
