<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c8a800">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SENNA — Entrar</title>
  <link rel="icon" type="image/png" href="helmet.png">
  <link rel="apple-touch-icon" href="helmet.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Background stripes -->
  <div class="bg-stripes">
    <div class="bg-stripe bg-green"></div>
    <div class="bg-stripe bg-blue"></div>
    <div class="bg-stripe bg-yellow"></div>
  </div>

  <!-- Particles canvas -->
  <canvas id="bgParticles"></canvas>

  <!-- Login card -->
  <div class="login-container">
    <div class="login-card">
      <!-- Helmet icon -->
      <div class="login-helmet">
        <img src="helmet.png" alt="SENNA" width="120" height="120" />
      </div>

      <h1 class="login-title">SENNA</h1>
      <p class="login-subtitle">Sua inteligencia artificial sem limites</p>

      <!-- Google Sign In -->
      <button class="btn-google" id="googleSignIn">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      </button>

      <div class="login-divider">
        <span>ou</span>
      </div>

      <!-- Email Sign In -->
      <form class="login-form" id="emailForm">
        <input type="email" id="emailInput" placeholder="Seu e-mail" required autocomplete="email">
        <button type="submit" class="btn-email">
          Continuar com e-mail
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>

      <!-- Magic link sent message -->
      <div class="login-magic-sent hidden" id="magicSent">
        <svg viewBox="0 0 24 24" fill="none" stroke="#009B3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
          <path d="M22 4L12 14.01l-3-3"/>
        </svg>
        <p>Link magico enviado!</p>
        <span>Verifique seu e-mail para entrar.</span>
      </div>

      <!-- Error message -->
      <div class="login-error hidden" id="loginError">
        <p id="errorText"></p>
      </div>

      <p class="login-footer-text">
        Ao entrar, voce concorda com os <a href="#">Termos</a> e <a href="#">Politica de Privacidade</a>.
      </p>
    </div>

    <!-- Bottom stripe bar -->
    <div class="login-stripe-bar">
      <div class="stripe s-green"></div>
      <div class="stripe s-blue"></div>
      <div class="stripe s-yellow"></div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
